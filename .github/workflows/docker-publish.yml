# Build the uzdoom-wasm container image and publish it to GHCR.
#
# Triggers:
#   - Push to `main`              → publishes :latest + :sha-<short>
#   - Push of a `v*` tag          → publishes :v1.2.3 + :1.2 + :latest
#   - Manual dispatch (UI button) → publishes :latest + :sha-<short>
#
# Auth: the workflow-scoped GITHUB_TOKEN has `packages: write` (granted
# below) which is all GHCR needs — no PAT or secret setup required.
#
# First successful publish lands at:
#   ghcr.io/<owner>/uzdoom-wasm:latest
#
# By default the package is PRIVATE. To make it pullable without auth:
#   Your GitHub profile → Packages → uzdoom-wasm → Package settings
#   → Change visibility → Public. One-time, per-package.

name: Build and publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image paths must be lowercase. `github.repository` preserves
      # the owner's casing (e.g. `Alex/uzdoom-wasm`), so lowercase it
      # defensively — harmless if already lower.
      - name: Compute lowercase image name
        id: name
        run: echo "image=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces tag list for docker/build-push-action. Branch pushes get
      # `:latest` + `:sha-abcd123`. Tag pushes (`git tag v1.2.3 && git push
      # --tags`) also get `:1.2.3` and `:1.2` for semver consumers.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.name.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # `cache-from` / `cache-to: type=gha` uses GitHub's Actions cache
      # for Docker layers. First build ≈ 5 min (full WASM compile);
      # rebuilds without source changes ≈ 30 s (re-uses cached layers).
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
